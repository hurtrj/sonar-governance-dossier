<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relatório Sonar</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f6f8;
  margin: 0;
  padding: 20px;
}

.panel {
  background: #fff;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 6px;
}

.issue {
  background: #fff;
  margin-bottom: 10px;
  border-left: 5px solid #ccc;
  padding: 10px;
}
</style>
</head>

<body>

<h1>Relatório de Issues Sonar</h1>

<div class="panel">
  <input type="file" id="jsonFile" accept=".json">
  <input type="text" id="searchBox" placeholder="Buscar...">
</div>

<div id="issuesContainer"></div>

<script>

let issues = [];

document.getElementById("jsonFile").addEventListener("change", function(event) {
  const file = event.target.files[0];
  const reader = new FileReader();

  reader.onload = function(e) {
    issues = JSON.parse(e.target.result);
    renderIssues();
  };

  reader.readAsText(file);
});

document.getElementById("searchBox").addEventListener("input", renderIssues);

function renderIssues() {
  const container = document.getElementById("issuesContainer");
  const search = document.getElementById("searchBox").value.toLowerCase();

  container.innerHTML = "";

  issues.forEach(item => {
    const text = JSON.stringify(item).toLowerCase();

    if (!text.includes(search)) return;

    const div = document.createElement("div");
    div.className = "issue";

    // Header seguro
    const header = document.createElement("div");
    header.textContent = `Projeto: ${item.component || 'N/A'} | Severidade: ${item.severity}`;

    // Body seguro
    const pre = document.createElement("pre");
    pre.textContent = JSON.stringify(item, null, 2);

    div.appendChild(header);
    div.appendChild(pre);

    container.appendChild(div);
  });
}

</script>

</body>
</html>
