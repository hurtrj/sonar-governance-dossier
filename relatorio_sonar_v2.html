<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Dossiê Técnico de Governança – SonarQube</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 20px;
      color: #333;
    }
    h1 { margin-bottom: 5px; }
    .subtitle { color: #666; margin-bottom: 20px; }

    .panel {
      background: #fff;
      padding: 15px;
      border-radius: 6px;
      margin-bottom: 15px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }

    .filters {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      align-items: center;
    }

    select, input {
      padding: 6px;
      min-width: 220px;
    }

    .issue {
      background: #fff;
      margin-bottom: 12px;
      border-radius: 6px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }

    .issue-header {
      padding: 10px 15px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      border-left: 6px solid #999;
    }

    .minor { border-color: #4caf50; }
    .major { border-color: #ff9800; }
    .critical { border-color: #f44336; }

    .issue-body {
      display: none;
      padding: 15px;
      border-top: 1px solid #ddd;
      background: #fafafa;
    }

    pre {
      background: #eee;
      padding: 10px;
      overflow-x: auto;
      font-size: 13px;
    }
  </style>
</head>

<body>

<h1>Dossiê Técnico de Governança – SonarQube</h1>
<div class="subtitle">
  Relatório consolidado de múltiplos projetos
</div>

<div class="panel">
  📂 Carregar JSON:
  <input type="file" id="jsonFile" accept=".json" />
</div>

<div class="panel filters">
  🔽 Projeto:
  <select id="projectFilter">
    <option value="ALL">Todos</option>
  </select>

  🔍 Buscar:
  <input type="text" id="searchBox" placeholder="mensagem, regra, arquivo..." />
</div>

<div id="issuesContainer"></div>

<script>
let issues = [];

const projectFilter = document.getElementById("projectFilter");
const searchBox = document.getElementById("searchBox");

document.getElementById("jsonFile").addEventListener("change", function (event) {
  const reader = new FileReader();
  reader.onload = function () {
    issues = JSON.parse(reader.result);
    populateProjects();
    renderIssues();
  };
  reader.readAsText(event.target.files[0]);
});

projectFilter.addEventListener("change", renderIssues);
searchBox.addEventListener("input", renderIssues);

function populateProjects() {
  const projects = [...new Set(issues.map(i => i.meta.projectKey))];
  projectFilter.innerHTML = `<option value="ALL">Todos</option>`;
  projects.forEach(p => {
    const opt = document.createElement("option");
    opt.value = p;
    opt.textContent = p;
    projectFilter.appendChild(opt);
  });
}

function renderIssues() {
  const container = document.getElementById("issuesContainer");
  container.innerHTML = "";

  const projectValue = projectFilter.value;
  const searchValue = searchBox.value.toLowerCase();

  issues.forEach(item => {
    const fullText = JSON.stringify(item).toLowerCase();

    if (projectValue !== "ALL" && item.meta.projectKey !== projectValue) return;
    if (searchValue && !fullText.includes(searchValue)) return;

    const issue = item.issue;
    const severity = issue.severity.toLowerCase();

    const div = document.createElement("div");
    div.className = "issue";

    const header = document.createElement("div");
    header.className = `issue-header ${severity}`;
    header.innerHTML = `
      <div>
        <strong>${issue.rule}</strong> – ${issue.message}<br/>
        <small>
          Projeto: <strong>${item.meta.projectKey}</strong><br/>
          ${issue.component} | linha ${issue.line}
        </small>
      </div>
      <div>${issue.severity}</div>
    `;

    const body = document.createElement("div");
    body.className = "issue-body";
    body.innerHTML = `
      <h4>Meta</h4>
      <pre>${JSON.stringify(item.meta, null, 2)}</pre>

      <h4>Issue (completo)</h4>
      <pre>${JSON.stringify(item.issue, null, 2)}</pre>

      <h4>Regra (completo)</h4>
      <pre>${JSON.stringify(item.rule, null, 2)}</pre>

      <h4>Erros</h4>
      <pre>${JSON.stringify(item.errors, null, 2)}</pre>
    `;

    header.onclick = () => {
      body.style.display = body.style.display === "none" ? "block" : "none";
    };

    div.appendChild(header);
    div.appendChild(body);
    container.appendChild(div);
  });
}
</script>

</body>
</html>
